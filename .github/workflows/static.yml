# Simple workflow for deploying static content to GitHub Pages
name: Deploy static content to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # --- ADD THIS STEP ---
      - name: Inject secrets into HTML
        run: |
          sed -i "s/\[MESSENGER_USERNAME\]/${{ secrets.MESSENGER_USERNAME }}/g" index.html
          sed -i "s/\[RECIPIENT_FIRST_NAME\]/${{ secrets.RECIPIENT_FIRST_NAME }}/g" index.html
          sed -i "s/\[RECIPIENT_FULL_NAME\]/${{ secrets.RECIPIENT_FULL_NAME }}/g" index.html
          sed -i "s/\[RECIPIENT_SHORT_NAME\]/${{ secrets.RECIPIENT_SHORT_NAME }}/g" index.html
          sed -i "s/\[SENDER_FIRST_NAME\]/${{ secrets.SENDER_FIRST_NAME }}/g" index.html
          sed -i "s/\[SENDER_FULL_NAME\]/${{ secrets.SENDER_FULL_NAME }}/g" index.html
      # ---------------------

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
